/* 拖曳事件綁定（在 renderList 後呼叫） */
function bindDragEvents() {
  const grid = document.getElementById('listGrid');
  grid.classList.add('sort-mode');

  const cards = grid.querySelectorAll('.list-card[data-id]');

  cards.forEach(card => {
    card.setAttribute('draggable', 'true');

    card.addEventListener('dragstart', e => {
      dragSrcId = card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrcId);
    });

    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      grid.querySelectorAll('.list-card').forEach(c => c.classList.remove('drag-over'));
    });

    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (card.dataset.id !== dragSrcId) {
        grid.querySelectorAll('.list-card').forEach(c => c.classList.remove('drag-over'));
        card.classList.add('drag-over');
      }
    });

    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });

    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      if (!dragSrcId || dragSrcId === card.dataset.id) return;

      const srcCard = grid.querySelector(`[data-id="${dragSrcId}"]`);
      if (!srcCard) return;

      // 判斷插入位置（前或後）
      const rect = card.getBoundingClientRect();
      const midX = rect.left + rect.width / 2;
      const midY = rect.top + rect.height / 2;
      const cols = 4;
      // 用滑鼠位置決定插入前/後
      const after = e.clientX > midX || (Math.abs(e.clientX - midX) < 10 && e.clientY > midY);

      if (after) {
        card.after(srcCard);
      } else {
        card.before(srcCard);
      }
      dragSrcId = null;
    });

    // 觸控裝置支援（iPad）
    let touchStartX, touchStartY, touchClone, touchTarget;
    card.addEventListener('touchstart', e => {
      if (!isSortMode) return;
      const touch = e.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      touchTarget = card;

      // 製作拖曳分身
      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `
        position: fixed; pointer-events: none; z-index: 9999;
        width: ${card.offsetWidth}px; opacity: 0.85;
        transform: scale(1.04); box-shadow: 0 20px 48px rgba(51,78,90,0.2);
        left: ${touch.clientX - card.offsetWidth/2}px;
        top:  ${touch.clientY - card.offsetHeight/2}px;
        transition: none;
      `;
      document.body.appendChild(touchClone);
      card.classList.add('dragging');
      e.preventDefault();
    }, { passive: false });

    card.addEventListener('touchmove', e => {
      if (!touchClone) return;
      const touch = e.touches[0];
      touchClone.style.left = `${touch.clientX - touchClone.offsetWidth/2}px`;
      touchClone.style.top  = `${touch.clientY - touchClone.offsetHeight/2}px`;

      // 找 hover 目標
      const els = document.elementsFromPoint(touch.clientX, touch.clientY);
      const over = els.find(el => el.classList.contains('list-card') && el !== touchTarget && el !== touchClone);
      grid.querySelectorAll('.list-card').forEach(c => c.classList.remove('drag-over'));
      if (over) over.classList.add('drag-over');
      e.preventDefault();
    }, { passive: false });

    card.addEventListener('touchend', e => {
      if (!touchClone) return;
      const touch = e.changedTouches[0];
      const els = document.elementsFromPoint(touch.clientX, touch.clientY);
      const over = els.find(el => el.classList.contains('list-card') && el !== touchTarget && el !== touchClone);

      if (over) {
        const rect = over.getBoundingClientRect();
        const after = touch.clientX > rect.left + rect.width / 2;
        after ? over.after(touchTarget) : over.before(touchTarget);
      }

      touchClone.remove();
      touchClone = null;
      touchTarget.classList.remove('dragging');
      grid.querySelectorAll('.list-card').forEach(c => c.classList.remove('drag-over'));
    });
  });
}

function renderList() {
  const grid = document.getElementById('listGrid');
  grid.classList.remove('sort-mode');

  const allSorted = getSortedProjects();

  let filtered = isSortMode
    ? allSorted   // 編輯模式顯示全部
    : allSorted.filter(p => {
        if (currentFilters.style !== 'all' && p.style !== currentFilters.style) return false;
        if (currentFilters.type !== 'all' && p.type !== currentFilters.type) return false;
        if (currentFilters.size !== 'all') {
          const s = p.size, f = currentFilters.size;
          if (f === '0-20' && s >= 20) return false;
          if (f === '20-30' && (s < 20 || s >= 30)) return false;
          if (f === '30-50' && (s < 30 || s >= 50)) return false;
          if (f === '50+' && s < 50) return false;
        }
        return true;
      });

  document.getElementById('listTotal').textContent = `(${filtered.length})`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="list-empty">符合條件的作品尚未上架</div>';
    return;
  }

  const sizes = ['tall', 'square', 'wide', 'tall', 'short', 'square'];

  grid.innerHTML = filtered.map((p, i) => {
    const sz = sizes[i % sizes.length];
    return `
    <div class="list-card" data-id="${p.id}" data-size="${sz}" onclick="${isSortMode ? '' : `openProject('${p.id}')`}">
      <div class="lc-img">
        <img src="${p.cover}" alt="${p.title}" loading="lazy">
      </div>
      <div class="lc-tag">${p.style}</div>
      <div class="lc-body">
          <div class="lc-title">${p.title}</div>
        <div class="lc-meta">${p.location} · ${p.size} 坪</div>
      </div>
    </div>
  `}).join('');

  if (isSortMode) {
    // 排序模式：卡片直接全部顯示（不走 IntersectionObserver）
    grid.querySelectorAll('.list-card').forEach(c => {
      c.classList.add('in-view');
      c.classList.add('visible');
    });
    bindDragEvents();
  } else {
    refreshObserver();
  }
}

/* ===========================================
   案例詳情頁
=========================================== */
function openProject(id) {
  const project = PROJECTS.find(p => p.id === id);
  if (!project) return;
  currentProject = project;

  document.getElementById('detailTitle').textContent = project.title;
  document.getElementById('detailSize').textContent = project.size + ' 坪';
  document.getElementById('detailRooms').textContent = project.rooms;
  document.getElementById('detailDesc').textContent = project.desc;
  document.getElementById('detailCover').src = project.cover;
  document.getElementById('detailCaptionLeft').textContent = `— ${project.title}`;
  document.getElementById('detailCaptionRight').textContent = `第 ${project.num} 案`;

  const idx = PROJECTS.findIndex(p => p.id === id);
  document.getElementById('detailProgress').textContent =
    `— ${String(idx + 1).padStart(2, '0')} / ${String(PROJECTS.length).padStart(2, '0')} —`;

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === PROJECTS.length - 1;

  document.getElementById('countPhotos').textContent = `[${String(project.photos.length).padStart(2, '0')}]`;
  document.getElementById('countBefore').textContent = `[${String(project.before.length).padStart(2, '0')}]`;
  document.getElementById('count3d').textContent = `[${String(project.renders.length).padStart(2, '0')}]`;
  document.getElementById('countPlans').textContent = `[${[project.plans?.before, project.plans?.after].filter(Boolean).length.toString().padStart(2,'0')}]`;
  document.getElementById('countVideos').textContent = `[${String(project.videos.length).padStart(2, '0')}]`;

  switchTab('photos');
  renderPagination(idx);
  navigate('detail');
}

function navProject(dir) {
  const idx = PROJECTS.findIndex(p => p.id === currentProject.id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= PROJECTS.length) return;
  openProject(PROJECTS[newIdx].id);
}

function renderPagination(idx) {
  const prev = idx > 0 ? PROJECTS[idx - 1] : null;
  const next = idx < PROJECTS.length - 1 ? PROJECTS[idx + 1] : null;
  const container = document.getElementById('detailPagination');

  let html = '';
  if (prev) {
    html += `
      <div onclick="openProject('${prev.id}')">
        <div class="pag-label">← 上一案</div>
        <div class="pag-title">${prev.title}</div>
      </div>
    `;
  } else {
    html += '<div></div>';
  }
  if (next) {
    html += `
      <div onclick="openProject('${next.id}')">
        <div class="pag-label">下一案 →</div>
        <div class="pag-title">${next.title}</div>
      </div>
    `;
  } else {
    html += '<div></div>';
  }
  container.innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

  const gallery = document.getElementById('detailGallery');

  if (tab === 'photos') {
    if (currentProject.photos.length === 0) {
      gallery.innerHTML = '<div class="gallery-empty">尚無完工照片</div>';
      return;
    }
    // 三欄均等網格，每三張一排
    const photos = currentProject.photos;
    let html = '<div class="gallery-spread">';
    photos.forEach((src, i) => {
      html += `<div class="gallery-item" onclick="openLightbox(${i}, 'photos')"><img src="${src}" loading="lazy" alt=""></div>`;
    });
    html += '</div>';
    gallery.innerHTML = html;

  } else if (tab === 'before') {
    const before = currentProject.before;
    const after  = currentProject.photos;
    if (before.length === 0 && after.length === 0) {
      gallery.innerHTML = '<div class="gallery-empty">尚無對比照片</div>';
      return;
    }
    const pairCount = Math.max(before.length, after.length);
    let html = '';
    for (let i = 0; i < pairCount; i++) {
      html += '<div class="gallery-before-after">';
      // 左：BEFORE
      if (before[i]) {
        html += `<div class="ba-item" onclick="openLightbox(${i}, 'before')">
          <div class="ba-img"><img src="${before[i]}" loading="lazy" alt="施工前"></div>
          <div class="ba-label">BEFORE</div>
        </div>`;
      } else {
        html += '<div class="ba-item"><div class="ba-img"></div><div class="ba-label">BEFORE</div></div>';
      }
      // 右：AFTER
      if (after[i]) {
        html += `<div class="ba-item" onclick="openLightbox(${i}, 'photos')">
          <div class="ba-img"><img src="${after[i]}" loading="lazy" alt="完工後"></div>
          <div class="ba-label after">AFTER</div>
        </div>`;
      } else {
        html += '<div class="ba-item"><div class="ba-img"></div><div class="ba-label after">AFTER</div></div>';
      }
      html += '</div>';
    }
    gallery.innerHTML = html;

  } else if (tab === '3d') {
    if (currentProject.renders.length === 0) {
      gallery.innerHTML = '<div class="gallery-empty">尚無 3D 渲染圖</div>';
      return;
    }
    gallery.innerHTML = '<div class="gallery-3d">' +
      currentProject.renders.map((src, i) => `
        <div class="gallery-item" onclick="openLightbox(${i}, '3d')">
          <img src="${src}" loading="lazy" alt="">
        </div>
      `).join('') +
    '</div>';

  } else if (tab === 'plans') {
    const p = currentProject.plans;
    const hasBefore = p && p.before;
    const hasAfter  = p && p.after;

    if (!hasBefore && !hasAfter) {
      gallery.innerHTML = '<div class="gallery-empty">尚無平面圖</div>';
      return;
    }

    gallery.innerHTML = `
      <div class="gallery-plans">
        <div class="plan-side" onclick="${hasBefore ? "openLightbox(0,'plans')" : ''}">
          ${hasBefore
            ? `<div class="plan-img-wrap"><img src="${p.before}" loading="lazy" alt="Before"></div>`
            : `<div class="plan-img-wrap plan-empty"></div>`}
          <div class="plan-label">BEFORE</div>
        </div>
        <div class="plan-side" onclick="${hasAfter ? "openLightbox(1,'plans')" : ''}">
          ${hasAfter
            ? `<div class="plan-img-wrap"><img src="${p.after}" loading="lazy" alt="After"></div>`
            : `<div class="plan-img-wrap plan-empty"></div>`}
          <div class="plan-label after">AFTER</div>
        </div>
      </div>
    `;
    gallery.innerHTML = gallery.innerHTML;

  } else if (tab === 'videos') {
    if (currentProject.videos.length === 0) {
      gallery.innerHTML = '<div class="gallery-empty">尚無影片</div>';
      return;
    }
    gallery.innerHTML = '<div class="gallery-videos">' +
      currentProject.videos.map(v => `
        <div class="gallery-video">
          <iframe src="https://www.youtube.com/embed/${v.id}" allowfullscreen></iframe>
        </div>
      `).join('') +
    '</div>';
  }

  refreshObserver();
}

/* ===========================================
   Lightbox
=========================================== */
let lbImages = [];
let lbIdx = 0;

function openLightbox(idx, tab) {
  if (tab === 'photos') lbImages = currentProject.photos;
  else if (tab === 'before') lbImages = currentProject.before;
  else if (tab === '3d') lbImages = currentProject.renders;
  else if (tab === 'plans') {
    const p = currentProject.plans;
    lbImages = [p?.before, p?.after].filter(Boolean);
  }
  lbIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}

function lightboxNav(dir) {
  lbIdx = (lbIdx + dir + lbImages.length) % lbImages.length;
  updateLightbox();
}

function updateLightbox() {
  document.getElementById('lightboxImg').src = lbImages[lbIdx];
  document.getElementById('lightboxCounter').textContent =
    `${String(lbIdx + 1).padStart(2,'0')} / ${String(lbImages.length).padStart(2,'0')}`;
}

document.addEventListener('keydown', (e) => {
  if (document.getElementById('lightbox').classList.contains('active')) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
  } else if (currentPage === 'detail') {
    if (e.key === 'ArrowLeft') navProject(-1);
    if (e.key === 'ArrowRight') navProject(1);
  }
});

/* ===========================================
   數字計數動畫（首頁統計）
=========================================== */
function animateCounter(el, target, duration = 1400) {
  const start = 0;
  const startTime = performance.now();
  function step(t) {
    const progress = Math.min((t - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
    const value = Math.floor(start + (target - start) * eased);
    el.textContent = String(value).padStart(2, '0');
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = String(target).padStart(2, '0');
  }
  requestAnimationFrame(step);
}

// 觀察首頁的 stat 數字，進場時計數
function initCounters() {
  const stats = document.querySelectorAll('.cover-stat .stat-num');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const target = parseInt(entry.target.textContent, 10);
        if (!isNaN(target)) {
          animateCounter(entry.target, target);
        }
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.4 });
  stats.forEach(s => observer.observe(s));
}

// 在 DOMContentLoaded 之後（不直接在 init 裡是因為 cover 一進入就在視窗內）
window.addEventListener('load', () => {
  setTimeout(initCounters, 1500);
});

/* ===========================================
   滑鼠視差：spread 拼貼圖跟隨
=========================================== */
function initSpreadParallax() {
  document.addEventListener('mousemove', (e) => {
    if (currentPage !== 'home') return;
    const spreads = document.querySelectorAll('.spread.in-view');
    spreads.forEach(spread => {
      const rect = spread.getBoundingClientRect();
      // 只處理視窗內的
      if (rect.top > window.innerHeight || rect.bottom < 0) return;
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / rect.width;
      const dy = (e.clientY - cy) / rect.height;
      const main = spread.querySelector('.img-main img');
      const small1 = spread.querySelector('.img-small-1 img');
      if (main) main.style.transform = `scale(1.04) translate(${dx * 6}px, ${dy * 6}px)`;
      if (small1) small1.style.transform = `scale(1.02) translate(${dx * -4}px, ${dy * -4}px)`;
    });
  }, { passive: true });
}

window.addEventListener('load', initSpreadParallax);
